name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  #  Windows — installateur .exe (Inno Setup)
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extraire la version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Telecharger Python embeddable 3.11
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" `
            -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" `
            -DestinationPath "installer\windows\python-embed" -Force

      - name: Telecharger get-pip.py
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" `
            -OutFile "installer\windows\get-pip.py"

      - name: Telecharger ffmpeg Windows
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" `
            -OutFile "ffmpeg-win.zip"
          Expand-Archive -Path "ffmpeg-win.zip" -DestinationPath "ffmpeg-tmp" -Force
          New-Item -ItemType Directory -Force -Path "ffmpeg\windows" | Out-Null
          Get-ChildItem -Recurse -Filter "ffmpeg.exe" "ffmpeg-tmp" |
            Select-Object -First 1 |
            Copy-Item -Destination "ffmpeg\windows\ffmpeg.exe"

      - name: Creer le dossier dist
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "dist" | Out-Null

      - name: Compiler avec Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion="${{ steps.version.outputs.VERSION }}" "installer\windows\setup.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verifier l installateur Windows
        shell: pwsh
        run: |
          $exe = "dist\AutoTranscript-Setup-Windows.exe"
          if (-not (Test-Path $exe)) { Write-Error "Installateur manquant : $exe"; exit 1 }
          $size = (Get-Item $exe).Length
          if ($size -lt 1MB) { Write-Error "Installateur trop petit ($size octets)"; exit 1 }
          Write-Host "OK : $exe ($([math]::Round($size/1MB, 1)) Mo)"

      - name: Upload artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/AutoTranscript-Setup-Windows.exe

  # ─────────────────────────────────────────────
  #  Linux — paquet .deb
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extraire la version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Construire le paquet .deb
        run: |
          chmod +x installer/linux/build-deb.sh
          VERSION=${{ steps.version.outputs.VERSION }} ./installer/linux/build-deb.sh

      - name: Verifier l installation du paquet
        run: |
          # dpkg --unpack installe les fichiers sans executer le postinst (evite 3 Go de telechargement)
          sudo dpkg --unpack ./dist/*.deb
          # Installe uniquement la dependance GUI pour le smoke test
          pip install customtkinter --quiet
          python3 /opt/autotranscript/app/main.py --check

      - name: Upload artifact Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb

  # ─────────────────────────────────────────────
  #  Modèle pyannote — téléchargé depuis HuggingFace
  #  et packagé comme asset de release
  #  Prérequis : secret HF_TOKEN dans le dépôt GitHub
  #  (Settings > Secrets > Actions > New repository secret)
  # ─────────────────────────────────────────────
  package-pyannote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer huggingface_hub
        run: pip install huggingface_hub

      - name: Telecharger et packager les modeles pyannote
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p dist
          python scripts/download_pyannote.py

      - name: Upload artifact pyannote
        uses: actions/upload-artifact@v4
        with:
          name: pyannote-model
          path: dist/pyannote-community-1.zip

  # ─────────────────────────────────────────────
  #  Créer la GitHub Release avec les trois fichiers
  # ─────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-linux, package-pyannote]
    runs-on: ubuntu-latest
    steps:
      - name: Telecharger tous les artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Creer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
